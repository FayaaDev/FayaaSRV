domain: example.com
docker_net: caddy_net
platform: linux
admin_user: faya
tz: Asia/Riyadh
foundation_services:
  - nocodb
  - homepage
  - uptime-kuma
  - dockge
selected_services:
  - n8n
  - immich
  - transfer
  - jellyfin
subdomains:
  nocodb: data
  homepage: home
  uptime-kuma: status
  dockge: dock
  n8n: flow
  immich: photos
  transfer: send
  jellyfin: media
NOCODB_SUBDOMAIN: data
HOMEPAGE_SUBDOMAIN: home
UPTIME_KUMA_SUBDOMAIN: status
DOCKGE_SUBDOMAIN: dock
N8N_SUBDOMAIN: flow
IMMICH_SUBDOMAIN: photos
TRANSFER_SUBDOMAIN: send
JELLYFIN_SUBDOMAIN: media
POSTGRES_PASSWORD: postgres-pass
NOCODB_ADMIN_PASS: nocodb-admin-pass
NOCODB_DB_PASS: nocodb-db-pass
UPTIME_KUMA_ADMIN_USER: admin
UPTIME_KUMA_ADMIN_PASS: uptime-kuma-admin-pass
N8N_DB_PASS: n8n-db-pass
N8N_ENCRYPTION_KEY: n8n-encryption-key-123456789012
IMMICH_DB_PASSWORD: immich-db-password-123456789012
IMMICH_VERSION: release
ADMIN_EMAIL: admin@example.com
TZ: Asia/Riyadh
cloudflare:
  ssh_subdomain: ssh
lan_ip: 192.168.0.10
host_gateway: 172.18.0.1
secrets:
  mode: manual
  n8n_mode: fresh
  values:
    POSTGRES_PASSWORD: postgres-pass
    NOCODB_ADMIN_PASS: nocodb-admin-pass
    NOCODB_DB_PASS: nocodb-db-pass
    UPTIME_KUMA_ADMIN_USER: admin
    UPTIME_KUMA_ADMIN_PASS: uptime-kuma-admin-pass
    N8N_DB_PASS: n8n-db-pass
    N8N_ENCRYPTION_KEY: n8n-encryption-key-123456789012
    IMMICH_DB_PASSWORD: immich-db-password-123456789012
    IMMICH_VERSION: release
